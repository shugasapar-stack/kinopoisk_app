name: cineverse_app
description: A premium Kinopoisk-inspired Flutter movie app with Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: 2.32.0
  firebase_auth: 4.20.0
  cloud_firestore: 4.17.5
  firebase_storage: 11.7.7
  google_sign_in: 6.2.2
  flutter_riverpod: 2.5.1
  go_router: 14.2.7
  cached_network_image: 3.4.0
  shimmer: 3.0.0
  google_fonts: 8.1.0
  flutter_animate: 4.5.0
  image_picker: 1.1.2
  shared_preferences: 2.3.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
